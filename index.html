                <button class="btn-cancel" data-action="close-repay">Annuler</button>
                <button class="confirm-btn" data-action="confirm-repay" style="background:#5B8266;flex:1">Confirmer</button>
              </div>
            </div>
          </div>`;
      }
      if (state.confirmDeleteLoan) {
        html += `
          <div class="confirm-backdrop" data-action="close-delete-loan">
            <div class="confirm-dialog" data-stop>
              <h3 class="confirm-title">Supprimer ce prêt ?</h3>
              <p class="confirm-msg">Ce prêt sera supprimé${state.user ? ' de tous tes appareils' : ''}.</p>
              <div class="confirm-actions">
                <button class="btn-cancel" data-action="close-delete-loan">Annuler</button>
                <button class="btn-danger" data-action="confirm-delete-loan">Supprimer</button>
              </div>
            </div>
          </div>`;
      }

      app.innerHTML = html;

      // Bind text input syncing (sans re-render à chaque touche)
      const amountEl = document.getElementById('amount-input');
      if (amountEl) {
        amountEl.addEventListener('input', (e) => {
          state.form.amount = e.target.value.replace(/[^0-9.,]/g, '');
          e.target.value = state.form.amount;
          const btn = document.querySelector('[data-action="confirm-add"]');
          if (btn) btn.disabled = !(parseFloat(state.form.amount.replace(',', '.')) > 0);
        });
      }
      const descEl = document.getElementById('desc-input');
      if (descEl) descEl.addEventListener('input', (e) => { state.form.description = e.target.value; });

      const cloudUrlEl = document.getElementById('cloud-url');
      if (cloudUrlEl) cloudUrlEl.addEventListener('input', (e) => { state.cloudForm.url = e.target.value; });
      const cloudKeyEl = document.getElementById('cloud-key');
      if (cloudKeyEl) cloudKeyEl.addEventListener('input', (e) => { state.cloudForm.key = e.target.value; });

      const authEmailEl = document.getElementById('auth-email');
      if (authEmailEl) authEmailEl.addEventListener('input', (e) => { state.authForm.email = e.target.value; });
      const authPwdEl = document.getElementById('auth-password');
      if (authPwdEl) authPwdEl.addEventListener('input', (e) => { state.authForm.password = e.target.value; });

      const loanAmountEl = document.getElementById('loan-amount-input');
      if (loanAmountEl) {
        loanAmountEl.addEventListener('input', (e) => {
          state.loanForm.amount = e.target.value.replace(/[^0-9.,]/g, '');
          e.target.value = state.loanForm.amount;
          const btn = document.querySelector('[data-action="confirm-add-loan"]');
          if (btn) btn.disabled = !(parseFloat(state.loanForm.amount.replace(',', '.')) > 0) || !state.loanForm.lender.trim();
        });
      }
      const loanLenderEl = document.getElementById('loan-lender-input');
      if (loanLenderEl) loanLenderEl.addEventListener('input', (e) => {
        state.loanForm.lender = e.target.value;
        const btn = document.querySelector('[data-action="confirm-add-loan"]');
        if (btn) btn.disabled = !(parseFloat(state.loanForm.amount.replace(',', '.')) > 0) || !state.loanForm.lender.trim();
      });
      const loanDescEl = document.getElementById('loan-desc-input');
      if (loanDescEl) loanDescEl.addEventListener('input', (e) => { state.loanForm.description = e.target.value; });
    }

    /* ==========================================================
       10) ÉVÉNEMENTS
       ========================================================== */
    document.addEventListener('click', async (e) => {
      const target = e.target.closest('[data-action]');
      if (!target) return;
      // --- AJOUT : Gestion de l'isolation des modales ---
      const stopZone = e.target.closest('[data-stop]');
      // Si on a cliqué dans une zone data-stop, mais que l'élément data-action 
      // trouvé est en dehors (le backdrop), on annule l'exécution.
      if (stopZone && !stopZone.contains(target)) {
        return;
      }
      const action = target.dataset.action;

      // Ouvrir modale ajout
      if (action === 'open-modal') {
        const type = target.dataset.type;
        state.form = { amount: '', description: '', category: type === 'income' ? 'salaire' : 'alimentation' };
        setState({ modal: type });
      }

      else if (action === 'close-modal') {
        if (target.classList.contains('modal-backdrop') || target.classList.contains('modal-close') || target.tagName === 'BUTTON') {
          setState({ modal: null, authError: null, authSuccess: null });
        }
      }

      else if (action === 'open-menu') {
        setState({ modal: 'menu' });
      }

      else if (action === 'select-cat') {
        state.form.category = target.dataset.cat;
        render();
      }

      else if (action === 'confirm-add') {
        const num = parseFloat(state.form.amount.replace(',', '.'));
        if (isNaN(num) || num <= 0) return;
        const type = state.modal;
        const newTx = {
          id: (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString() + Math.random().toString(36).slice(2, 8)),
          type,
          amount: num,
          category: state.form.category,
          description: state.form.description.trim() || findCat(type, state.form.category).label,
          date: new Date().toISOString(),
          deleted_at: null,
          synced: false,
        };
        await dbPut(newTx);
        await reloadFromLocal();
        setState({ modal: null });
        // Push au cloud (en arrière plan)
        if (state.user) syncEngine.pushChange(newTx);
      }

      else if (action === 'ask-delete') {
        setState({ confirmDelete: target.dataset.id });
      }
      else if (action === 'close-confirm') {
        setState({ confirmDelete: null });
      }
      else if (action === 'confirm-delete') {
        const id = state.confirmDelete;
        // Soft delete pour la sync
        const all = await dbGetAll();
        const tx = all.find(t => t.id === id);
        if (tx) {
          if (state.user) {
            const updated = { ...tx, deleted_at: new Date().toISOString(), synced: false };
            await dbPut(updated);
            syncEngine.pushChange(updated);
          } else {
            // En mode local : suppression dure (pas de sync à faire)
            const db = await openDB();
            await new Promise((res, rej) => {
              const t2 = db.transaction(STORE, 'readwrite');
              t2.objectStore(STORE).delete(id);
              t2.oncomplete = res; t2.onerror = () => rej(t2.error);
            });
          }
        }
        await reloadFromLocal();
        setState({ confirmDelete: null });
      }

      // ===== Cloud =====
      else if (action === 'open-cloud-setup') {
        const cfg = getCfg() || { url: DEFAULT_SUPABASE_URL, key: DEFAULT_SUPABASE_KEY };
        state.cloudForm = { url: cfg.url, key: cfg.key };
        state.authError = null;
        setState({ modal: 'cloud-setup' });
      }
      else if (action === 'dismiss-welcome') {
        localStorage.setItem('budget-welcome-dismissed', '1');
        setState({ welcomeBannerDismissed: true });
      }
      else if (action === 'save-cloud-config') {
        const url = state.cloudForm.url.trim();
        const key = state.cloudForm.key.trim();
        if (!url.startsWith('https://') || !url.includes('.supabase.co')) {
          state.authError = 'L\'URL doit ressembler à https://xxx.supabase.co';
          render(); return;
        }
        if (!key || key.length < 30) {
          state.authError = 'La clé "anon" semble invalide.';
          render(); return;
        }
        setCfg(url, key);
        state.authError = null;
        await initSupabaseClient();
        if (state.user) {
          // Déjà connecté
          showToast('Cloud configuré !');
          setState({ modal: 'menu' });
          syncEngine.fullSync();
        } else {
          // Demander connexion
          state.authMode = 'signin';
          state.authForm = { email: '', password: '' };
          setState({ modal: 'auth' });
        }
      }
      else if (action === 'open-auth') {
        if (!supabase) await initSupabaseClient();
        if (!supabase) { state.authError = 'Configure d\'abord le cloud.'; render(); return; }
        state.authMode = 'signin';
        state.authForm = { email: '', password: '' };
        state.authError = null; state.authSuccess = null;
        setState({ modal: 'auth' });
      }
      else if (action === 'auth-tab') {
        state.authMode = target.dataset.mode;
        state.authError = null; state.authSuccess = null;
        render();
      }
      else if (action === 'auth-submit') {
        if (!supabase) { state.authError = 'Cloud non configuré.'; render(); return; }
        const { email, password } = state.authForm;
        if (!email || !password) { state.authError = 'Remplis tous les champs.'; render(); return; }
        if (state.authMode === 'signup' && password.length < 6) {
          state.authError = 'Mot de passe : 6 caractères minimum.'; render(); return;
        }
        state.authLoading = true; state.authError = null; render();
        try {
          if (state.authMode === 'signup') {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            if (data.session) {
              // Connexion immédiate (si confirmation email désactivée)
              showToast('Compte créé !');
              setState({ modal: null, authLoading: false });
            } else {
              // Confirmation email requise
              state.authSuccess = 'Compte créé ! Vérifie ta boîte mail pour confirmer ton adresse, puis reconnecte-toi.';
              state.authMode = 'signin';
              state.authForm.password = '';
              setState({ authLoading: false });
            }
          } else {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            showToast('Connecté !');
            setState({ modal: null, authLoading: false });
          }
        } catch (err) {
          state.authError = err.message || 'Erreur d\'authentification';
          state.authLoading = false;
          render();
        }
      }
      else if (action === 'manual-sync') {
        await syncEngine.fullSync();
        showToast(state.syncStatus === 'error' ? 'Échec de la sync' : 'Synchronisé !');
      }
      else if (action === 'ask-signout') {
        setState({ modal: null, confirmSignOut: true });
      }
      else if (action === 'close-signout') {
        setState({ confirmSignOut: false });
      }
      else if (action === 'confirm-signout') {
        if (supabase) await supabase.auth.signOut();
        unsubscribeRealtime();
        setState({ confirmSignOut: false, syncStatus: 'local' });
      }
      else if (action === 'disable-cloud') {
        if (supabase) await supabase.auth.signOut();
        unsubscribeRealtime();
        clearCfg();
        supabase = null;
        state.user = null;
        setState({ modal: null, syncStatus: 'local' });
        showToast('Cloud désactivé');
      }

      // ===== Navigation =====
      else if (action === 'nav-budget') {
        setState({ currentPage: 'budget' });
      }
      else if (action === 'nav-stats') {
        setState({ currentPage: 'stats' });
      }
      else if (action === 'nav-compare') {
        setState({ currentPage: 'compare' });
      }
      else if (action === 'compare-prev' || action === 'compare-next') {
        const which = target.dataset.which;
        const key = which === '1' ? 'compareMonth1' : 'compareMonth2';
        const cur = which === '1' ? state.compareMonth1 : state.compareMonth2;
        const [y, m] = cur.split('-').map(Number);
        let d;
        if (action === 'compare-prev') {
          d = new Date(y, m - 2, 1);
        } else {
          d = new Date(y, m, 1);
          const nxt = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
          if (nxt > new Date().toISOString().slice(0, 7)) return;
        }
        setState({ [key]: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` });
      }
      else if (action === 'stats-period') {
        const period = target.dataset.period;
        // Si on revient sur "pick", remettre sur le mois courant par défaut
        const patch = { statsPeriod: period };
        if (period === 'pick') patch.statsPickedMonth = new Date().toISOString().slice(0, 7);
        setState(patch);
      }
      else if (action === 'stats-prev-month') {
        const [y, m] = state.statsPickedMonth.split('-').map(Number);
        const prev = new Date(y, m - 2, 1);
        setState({ statsPickedMonth: `${prev.getFullYear()}-${String(prev.getMonth() + 1).padStart(2, '0')}` });
      }
      else if (action === 'stats-next-month') {
        const [y, m] = state.statsPickedMonth.split('-').map(Number);
        const next = new Date(y, m, 1);
        const nextStr = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}`;
        if (nextStr <= new Date().toISOString().slice(0, 7)) setState({ statsPickedMonth: nextStr });
      }

      // ===== Prêts =====
      else if (action === 'open-loan-modal') {
        state.loanForm = { amount: '', lender: '', lenderType: 'famille', description: '' };
        setState({ modal: 'add-loan' });
      }
      else if (action === 'select-loan-type') {
        state.loanForm.lenderType = target.dataset.type;
        render();
      }
      else if (action === 'confirm-add-loan') {
        const num = parseFloat(state.loanForm.amount.replace(',', '.'));
        if (isNaN(num) || num <= 0 || !state.loanForm.lender.trim()) return;
        const newLoan = {
          id: (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString() + Math.random().toString(36).slice(2, 8)),
          amount: num,
          lender: state.loanForm.lender.trim(),
          lenderType: state.loanForm.lenderType,
          description: state.loanForm.description.trim(),
          date: new Date().toISOString(),
          status: 'actif',
          deleted_at: null,
          synced: false,
        };
        await loanPut(newLoan);

        // Ajouter automatiquement un revenu "Prêt reçu" au solde
        const loanIncomeTx = {
          id: (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString() + Math.random().toString(36).slice(2, 8)),
          type: 'income',
          amount: num,
          category: 'pret-recu',
          description: 'Prêt reçu — ' + newLoan.lender,
          date: newLoan.date,
          deleted_at: null,
          synced: false,
        };
        await dbPut(loanIncomeTx);
        if (state.user) syncEngine.pushChange(loanIncomeTx);

        await reloadFromLocal();
        setState({ modal: null });
        if (state.user) syncEngine.loanPushChange(newLoan);
        showToast('Prêt enregistré — solde mis à jour');
      }
      else if (action === 'ask-repay') {
        setState({ confirmRepay: target.dataset.id });
      }
      else if (action === 'close-repay') {
        setState({ confirmRepay: null });
      }
      else if (action === 'confirm-repay') {
        const id = state.confirmRepay;
        const all = await loanGetAll();
        const loan = all.find(l => l.id === id);
        if (loan) {
          // Marquer le prêt comme remboursé
          const updated = { ...loan, status: 'rembourse', synced: false };
          await loanPut(updated);
          if (state.user) syncEngine.loanPushChange(updated);

          // Créer automatiquement une dépense de remboursement
          const repayTx = {
            id: (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString() + Math.random().toString(36).slice(2, 8)),
            type: 'expense',
            amount: loan.amount,
            category: 'remboursement',
            description: 'Remboursement — ' + loan.lender,
            date: new Date().toISOString(),
            deleted_at: null,
            synced: false,
          };
          await dbPut(repayTx);
          if (state.user) syncEngine.pushChange(repayTx);
        }
        await reloadFromLocal();
        setState({ confirmRepay: null });
        showToast('Remboursé — dépense débitée ✓');
      }
      else if (action === 'ask-delete-loan') {
        setState({ confirmDeleteLoan: target.dataset.id });
      }
      else if (action === 'close-delete-loan') {
        setState({ confirmDeleteLoan: null });
      }
      else if (action === 'confirm-delete-loan') {
        const id = state.confirmDeleteLoan;
        if (state.user) {
          const all = await loanGetAll();
          const loan = all.find(l => l.id === id);
          if (loan) {
            const updated = { ...loan, deleted_at: new Date().toISOString(), synced: false };
            await loanPut(updated);
            syncEngine.loanPushChange(updated);
          }
        } else {
          await loanHardDelete(id);
        }
        const allLoans = await loanGetAll();
        state.loans = allLoans.filter(l => !l.deleted_at);
        setState({ confirmDeleteLoan: null });
      }

      // ===== Export / Import / Clear =====
      else if (action === 'export') {
        const data = JSON.stringify(state.transactions, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `budget-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }
      else if (action === 'import') {
        const fi = document.getElementById('file-input');
        fi.onchange = async (ev) => {
          const file = ev.target.files[0]; if (!file) return;
          try {
            const items = JSON.parse(await file.text());
            if (!Array.isArray(items)) throw new Error('Format invalide');
            const normalized = items.map(it => ({
              ...it,
              synced: false,
              deleted_at: it.deleted_at || null,
            }));
            await dbBulkPut(normalized);
            await reloadFromLocal();
            setState({ modal: null });
            showToast(`${items.length} opération(s) importée(s)`);
            if (state.user) syncEngine.fullSync();
          } catch (err) {
            showToast('Fichier invalide');
          }
        };
        fi.click();
      }
      else if (action === 'ask-clear') {
        setState({ modal: null, confirmClear: true });
      }
      else if (action === 'close-clear') {
        setState({ confirmClear: false });
      }
      else if (action === 'confirm-clear') {
        await dbClear();
        await reloadFromLocal();
        setState({ confirmClear: false });
        showToast('Cache local vidé');
        if (state.user) syncEngine.fullSync(); // re-télécharge depuis le cloud
      }
    });

    /* ==========================================================
       11) ÉVÉNEMENTS RÉSEAU + VISIBILITÉ (sync auto)
       ========================================================== */
    window.addEventListener('online', () => {
      if (state.user) syncEngine.fullSync();
    });
    window.addEventListener('offline', () => {
      state.syncStatus = state.user ? 'offline' : 'local';
      render();
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && state.user && navigator.onLine) {
        syncEngine.fullSync();
      }
    });

    /* ==========================================================
       12) SERVICE WORKER
       ========================================================== */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    /* ==========================================================
       13) INITIALISATION
       ========================================================== */
    (async function init() {
      try {
        await reloadFromLocal();
      } catch (e) {
        console.error('Local DB error', e);
      }

      // Si une config cloud est disponible, init Supabase + restore session
      if (getCfg()) {
        const cloudInit = (async () => {
          try {
            await initSupabaseClient();
            if (state.user) {
              subscribeRealtime();
              syncEngine.fullSync();
            }
          } catch (e) {
            console.error('Cloud init error', e);
          }
        })();

        // Timeout 8s : si le SDK Supabase (esm.sh) ne répond pas, on débloque quand même la page
        await Promise.race([
          cloudInit,
          new Promise(resolve => setTimeout(resolve, 8000))
        ]);
      }

      setState({ loading: false });
    })();
  </script>
</body>
</html>
